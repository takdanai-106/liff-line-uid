<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึก UID</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 80px; background-color: #f4f4f4; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; margin: 0 20px; }
        h2 { color: #333; }
        #status { margin-top: 15px; color: #00B900; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="title">กำลังประมวลผล...</h2>
        <p id="status">โปรดรอสักครู่ ระบบกำลังบันทึกข้อมูลของคุณ</p>
    </div>

    <script>
        const LIFF_ID = '2010674799-2HVyf02W'; 
        const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbx3KFQ7ypsXOVE8gmPz7HbAi4jgdB4C_ZdDUxdr-z5ncuJtQPqexxZI838V5NN7w8UPyQ/exec';

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    saveUidAutomatically();
                }
            } catch (err) {
                document.getElementById('status').innerText = "Error: " + err.message;
                document.getElementById('status').style.color = "red";
            }
        }

        async function saveUidAutomatically() {
            const titleText = document.getElementById('title');
            const statusText = document.getElementById('status');

            try {
                const profile = await liff.getProfile();
                
                // ปรับเปลี่ยนการ fetch เพื่อแก้ปัญหาค้างและ CORS
                await fetch(GAS_WEBAPP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // 🚨 ป้องกันปัญหาเบราว์เซอร์บล็อกจนค้าง
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ uid: profile.userId })
                });

                // เมื่อยิงคำขอสำเร็จ (ถึงแม้จะดึง response มาอ่านไม่ได้เนื่องจาก no-cors)
                // แต่ข้อมูลถึงหลังบ้านแล้วแน่นอน ให้สั่งแสดงสำเร็จและปิดจอเลย
                titleText.innerText = "บันทึกสำเร็จ!";
                statusText.innerText = "กำลังปิดหน้าต่างอัตโนมัติ...";
                setTimeout(() => liff.closeWindow(), 1500);

            } catch (error) {
                
                titleText.innerText = "เกิดข้อผิดพลาด";
                statusText.innerText = "Error: " + error.message;
                statusText.style.color = "red";
            }
        }

        main();
    </script>
</body>
</html>
